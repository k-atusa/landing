<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>KATUSA Programming Club - Terminal</title>
    <link rel="icon" type="image/png" href="https://upload.wikimedia.org/wikipedia/commons/8/8f/Eighth_Army_Logo_with_MSC_Logos.png" />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600;700&family=IBM+Plex+Sans:wght@500;600&display=swap" />
    <style>
        * {
            box-sizing: border-box;
        }

        html,
        body {
            height: 100%;
        }

        body {
            margin: 0;
            font-family: "IBM Plex Mono", "SFMono-Regular", Menlo, Consolas, monospace;
            background: #000000;
            color: #e6e6e6;
            overflow: hidden;
        }

        .terminal-body {
            width: 100%;
            height: 100%;
            margin: 0;
            padding: 8px 12px 16px;
            overflow-y: auto;
            overflow-x: hidden;
        }

        .output {
            display: flex;
            flex-direction: column;
            gap: 2px;
        }

        .line {
            white-space: pre-wrap;
            line-height: 1.3;
            overflow-wrap: anywhere;
            word-break: break-word;
            max-width: 100%;
        }

        .line.muted {
            color: #b4b4b4;
        }

        .line.warning {
            color: #ff7b72;
        }

        .line.accent {
            color: #8bff8b;
        }

        pre {
            margin: 0;
            white-space: pre-wrap;
            font-family: inherit;
            overflow-wrap: anywhere;
            word-break: break-word;
            max-width: 100%;
        }

        .prompt-line {
            display: flex;
            gap: 1ch;
            align-items: baseline;
            margin-top: 2px;
            flex-wrap: wrap;
            min-width: 0;
        }

        .prompt {
            color: #8bff8b;
        }

        #command-input {
            background: transparent;
            border: none;
            outline: none;
            padding: 0;
            margin: 0;
            color: #e6e6e6;
            flex: 1;
            font: inherit;
            line-height: 1.3;
            white-space: pre-wrap;
            word-break: break-word;
            overflow-wrap: anywhere;
            caret-color: transparent;
            min-width: 1ch;
        }

        #command-input:empty::before {
            content: attr(data-placeholder);
            color: #707070;
        }

        #command-input::after {
            content: " ";
            display: inline-block;
            width: 0.72ch;
            height: 1em;
            background: #e6e6e6;
            margin-left: 0.12ch;
            transform: translateY(0.15em);
            animation: block-blink 1s steps(1) infinite;
        }

        #command-input.is-disabled::after {
            display: none;
        }

        @keyframes block-blink {
            0%, 49% { opacity: 1; }
            50%, 100% { opacity: 0; }
        }

        @media (max-width: 600px) {
            body {
                padding: 0;
            }

            .terminal-body {
                height: 100%;
                padding: 4px 6px 12px;
            }
            }
    </style>
</head>
<body>
    <main class="terminal-body" id="terminal">
        <div class="output" id="output"></div>
        <div class="prompt-line" style="display: none;">
            <span class="prompt">katusa@humphreys:~$</span>
            <span id="command-input" contenteditable="false" spellcheck="false" class="is-disabled"></span>
        </div>
    </main>

    <script>
        const members = [
            { id: "D3vle0", sub: "leo [at] katusa [dot] xyz" },
            { id: "taewook427", sub: "ko [at] katusa [dot] xyz" },
            { id: "heon-1219", sub: "GitHub Member" },
            { id: "kimdongyeong0", sub: "GitHub Member" },
            { id: "yoonchanyeong", sub: "GitHub Member" }
        ];

        const shortcuts = [
            { name: "Github", url: "https://github.com/k-atusa" },
            { name: "YAS-web", url: "https://yas.katusa.xyz" },
            { name: "YAS-lite", url: "https://taewook427.github.io/SimpleWeb/YAS-web-lite/index.html" },
            { name: "Zkzzk", url: "https://zkzzk.katusa.xyz" },
            { name: "ASMR", url: "https://radio.katusa.xyz" },
            { name: "Barracks Layout", url: "https://barracks-layout-simulator.vercel.app" },
            { name: "Guide Docs", url: "https://docs.katusa.xyz" },
            { name: "Status", url: "https://status.katusa.xyz" },
            { name: "Ping Check", url: "https://mc-ping-check.vercel.app/?url=mc.katusa.xyz" }
        ];

        const commandInput = document.getElementById("command-input");
        const output = document.getElementById("output");
        const terminal = document.getElementById("terminal");

        const history = [];
        let historyIndex = -1;

        const enlistDate = new Date("2025-03-04T00:00:00+09:00");
        const targetDate = new Date("2026-09-03T00:00:00+09:00");

        const files = {
            "CNAME": { path: "CNAME", fallback: "katusa.space", cache: null },
            "README.md": { path: "README.md", fallback: "# landing\npowers katusa.xyz mainpage", cache: null },
            "index.html": { path: "index.html", fallback: null, cache: null }
        };
        const fileList = Object.keys(files);
        const virtualEntries = new Map();
        const hostName = "humphreys";
        const homeDirectory = "/home/katusa";
        const bootTimestamp = Date.now();

        function escapeHtml(value) {
            return value
                .replace(/&/g, "&amp;")
                .replace(/</g, "&lt;")
                .replace(/>/g, "&gt;")
                .replace(/\"/g, "&quot;")
                .replace(/'/g, "&#039;");
        }

        function printLine(text, className = "", isHtml = false) {
            const line = document.createElement("div");
            line.className = `line ${className}`.trim();
            if (isHtml) {
                line.innerHTML = text;
            } else {
                line.textContent = text;
            }
            output.appendChild(line);
            terminal.scrollTop = terminal.scrollHeight;
        }

        function printBlock(text, className = "block") {
            printLine(text, className, true);
        }

        function formatPercent(value) {
            return `${value.toFixed(3)}%`;
        }

        function normalizeEntryName(value) {
            if (typeof value !== "string") {
                return "";
            }
            const trimmed = value.trim();
            if (!trimmed) {
                return "";
            }
            return trimmed.endsWith("/") ? trimmed.slice(0, -1) : trimmed;
        }

        function isValidEntryName(value) {
            return Boolean(value) && !value.includes("/") && value !== "." && value !== "..";
        }

        function isSystemEntry(name) {
            return Object.prototype.hasOwnProperty.call(files, name);
        }

        function getEntryInfo(name) {
            const normalized = normalizeEntryName(name);
            if (virtualEntries.has(normalized)) {
                return { source: "virtual", entry: virtualEntries.get(normalized) };
            }
            if (isSystemEntry(normalized)) {
                return { source: "system", entry: { type: "file", readOnly: true } };
            }
            return null;
        }

        function listEntries() {
            const entries = [...fileList];
            virtualEntries.forEach((entry, name) => {
                entries.push(entry.type === "dir" ? `${name}/` : name);
            });
            return entries;
        }

        async function getFileContent(target) {
            const normalized = normalizeEntryName(target);
            const virtualEntry = virtualEntries.get(normalized);
            if (virtualEntry) {
                if (virtualEntry.type === "dir") {
                    return { error: "isDir" };
                }
                return { content: virtualEntry.content ?? "" };
            }
            const fileEntry = files[normalized];
            if (!fileEntry) {
                return { error: "missing" };
            }
            const { path, fallback: fallbackValue } = fileEntry;
            let fetchedText = null;
            try {
                const response = await fetch(path);
                if (response.ok) {
                    fetchedText = await response.text();
                    fileEntry.cache = fetchedText;
                } else {
                    fetchedText = null;
                }
            } catch (error) {
                console.warn(`cat: fetch failed for ${normalized} (${error?.message || error?.name || "Unknown error"})`);
                fetchedText = null;
            }
            if (typeof fetchedText === "string") {
                return { content: fetchedText };
            }
            if (typeof fileEntry.cache === "string") {
                return { content: fileEntry.cache };
            }
            if (typeof fallbackValue === "string") {
                return { content: fallbackValue };
            }
            return { error: "unreadable" };
        }

        function formatUptime(durationMs) {
            const totalSeconds = Math.max(0, Math.floor(durationMs / 1000));
            const days = Math.floor(totalSeconds / 86400);
            const hours = Math.floor((totalSeconds % 86400) / 3600);
            const minutes = Math.floor((totalSeconds % 3600) / 60);
            const parts = [];
            if (days > 0) {
                parts.push(`${days} day${days === 1 ? "" : "s"}`);
            }
            parts.push(`${String(hours).padStart(2, "0")}:${String(minutes).padStart(2, "0")}`);
            return parts.join(", ");
        }

        function getLoadAverages() {
            const base = [0.12, 0.08, 0.05];
            return base.map((value) => (value + Math.random() * 0.05).toFixed(2));
        }

        function etsStatus() {
            const now = new Date();
            const diffTime = targetDate - now;
            const diffDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24));
            const total = targetDate - enlistDate;
            const done = now - enlistDate;
            const ratio = Math.max(0, Math.min(1, done / total));
            const percent = ratio * 100;
            const barLength = 22;
            const filled = Math.round(ratio * barLength);
            const bar = `[${"#".repeat(filled)}${"-".repeat(barLength - filled)}]`;
            return { diffDays, percent, bar };
        }


        function commandHelp() {
            return [
                "help       show available commands",
                "about      club overview",
                "members    list member handles",
                "shortcuts  list site launchers",
                "open NAME  open shortcut in new tab",
                "ets        ETS countdown + progress",
                "date       show current date",
                "uname      show system info",
                "uptime     show system uptime",
                "hostname   show hostname",
                "echo TEXT  print text",
                "ls         list files",
                "cat FILE   show file contents",
                "head FILE  show first lines",
                "tail FILE  show last lines",
                "mkdir DIR  create directory",
                "touch FILE create file",
                "cp SRC DEST copy file",
                "mv SRC DEST move or rename",
                "rm [-r] NAME remove entry",
                "history    show command history",
                "clear      clear terminal",
                "id         show user identity",
                "pwd        print working directory",
                "whoami     show user"
            ].join("\n");
        }

        function findShortcut(term) {
            if (!term) {
                return null;
            }
            const trimmed = term.trim().toLowerCase();
            const byIndex = Number.parseInt(trimmed, 10);
            if (!Number.isNaN(byIndex) && shortcuts[byIndex - 1]) {
                return shortcuts[byIndex - 1];
            }
            return shortcuts.find((shortcut) => {
                const normalized = shortcut.name.toLowerCase().replace(/\s+/g, "");
                return shortcut.name.toLowerCase() === trimmed || normalized === trimmed;
            });
        }

        function showMembers() {
            const lines = members
                .map((member, index) => {
                    const count = String(index + 1).padStart(2, "0");
                    return `${count}. ${member.id} :: ${member.sub}`;
                })
                .join("\n");
            printBlock(`<pre>${escapeHtml(lines)}</pre>`);
        }

        function showShortcuts() {
            const lines = shortcuts
                .map((shortcut, index) => {
                    return `${index + 1}. ${shortcut.name} -> ${shortcut.url}`;
                })
                .join("\n");
            printBlock(`<pre>${escapeHtml(lines)}</pre>`);
        }

        function showAbout() {
            const text = [
                "KATUSA Programming Club",
                "Cycle 06-25",
                "Community hub for building, shipping, and sharing tools.",
                "Type 'members' or 'shortcuts' to explore."
            ].join("\n");
            printBlock(`<pre>${escapeHtml(text)}</pre>`);
        }

        function showEts() {
            const { diffDays, percent, bar } = etsStatus();
            const text = [
                `ETS Countdown: D-${diffDays}`,
                `Progress: ${bar} ${formatPercent(percent)}`
            ].join("\n");
            printBlock(`<pre>${escapeHtml(text)}</pre>`);
        }

        function showLs() {
            printLine(listEntries().join("  "), "muted");
        }

        async function showCat(target) {
            const normalized = normalizeEntryName(target);
            if (!normalized) {
                printLine("cat: missing file operand", "warning");
                return;
            }
            const result = await getFileContent(normalized);
            if (result.error === "missing") {
                printLine(`cat: ${normalized}: No such file`, "warning");
                return;
            }
            if (result.error === "isDir") {
                printLine(`cat: ${normalized}: Is a directory`, "warning");
                return;
            }
            if (result.error) {
                printLine(`cat: ${normalized}: Failed to read file`, "warning");
                return;
            }
            printBlock(`<pre>${escapeHtml(result.content)}</pre>`);
        }

        function showHistory() {
            const lines = history
                .map((entry, index) => `${String(index + 1).padStart(4, " ")}  ${entry}`)
                .join("\n");
            printBlock(`<pre>${escapeHtml(lines)}</pre>`);
        }

        function showEcho(text) {
            printLine(text ?? "");
        }

        function showHostname() {
            printLine(hostName, "muted");
        }

        function showUname() {
            printLine(
                `Linux ${hostName} 6.8.9-amd64 #1 SMP PREEMPT_DYNAMIC Debian 6.8.9-1 (2026-04-20) x86_64 GNU/Linux`,
                "muted"
            );
        }

        function showUptime() {
            const now = new Date();
            const uptimeText = formatUptime(Date.now() - bootTimestamp);
            const loads = getLoadAverages();
            const time = now.toTimeString().split(" ")[0];
            printLine(`${time} up ${uptimeText}, 1 user, load average: ${loads.join(", ")}`, "muted");
        }

        function touchFiles(targets) {
            if (targets.length === 0) {
                printLine("touch: missing file operand", "warning");
                return;
            }
            targets.forEach((rawName) => {
                const name = normalizeEntryName(rawName);
                if (!isValidEntryName(name)) {
                    printLine(`touch: cannot touch '${rawName}': No such file or directory`, "warning");
                    return;
                }
                if (isSystemEntry(name)) {
                    printLine(`touch: cannot touch '${name}': Permission denied`, "warning");
                    return;
                }
                const existing = virtualEntries.get(name);
                if (existing) {
                    if (existing.type === "dir") {
                        printLine(`touch: cannot touch '${name}': Is a directory`, "warning");
                        return;
                    }
                    existing.updatedAt = new Date();
                    return;
                }
                const now = new Date();
                virtualEntries.set(name, { type: "file", content: "", createdAt: now, updatedAt: now });
            });
        }

        function makeDirectories(targets) {
            if (targets.length === 0) {
                printLine("mkdir: missing operand", "warning");
                return;
            }
            targets.forEach((rawName) => {
                const name = normalizeEntryName(rawName);
                if (!isValidEntryName(name)) {
                    printLine(`mkdir: cannot create directory '${rawName}': No such file or directory`, "warning");
                    return;
                }
                if (getEntryInfo(name)) {
                    printLine(`mkdir: cannot create directory '${name}': File exists`, "warning");
                    return;
                }
                const now = new Date();
                virtualEntries.set(name, { type: "dir", createdAt: now, updatedAt: now });
            });
        }

        function parseRmArgs(args) {
            const options = { recursive: false, force: false };
            const targets = [];
            args.forEach((arg) => {
                if (arg.startsWith("-") && arg.length > 1) {
                    for (const flag of arg.slice(1)) {
                        if (flag === "r") {
                            options.recursive = true;
                        }
                        if (flag === "f") {
                            options.force = true;
                        }
                    }
                } else {
                    targets.push(arg);
                }
            });
            return { options, targets };
        }

        function removeEntries(args) {
            const { options, targets } = parseRmArgs(args);
            if (targets.length === 0) {
                printLine("rm: missing operand", "warning");
                return;
            }
            targets.forEach((rawName) => {
                const name = normalizeEntryName(rawName);
                if (!isValidEntryName(name)) {
                    if (!options.force) {
                        printLine(`rm: cannot remove '${rawName}': No such file or directory`, "warning");
                    }
                    return;
                }
                if (isSystemEntry(name)) {
                    if (!options.force) {
                        printLine(`rm: cannot remove '${name}': Permission denied`, "warning");
                    }
                    return;
                }
                const entry = virtualEntries.get(name);
                if (!entry) {
                    if (!options.force) {
                        printLine(`rm: cannot remove '${name}': No such file or directory`, "warning");
                    }
                    return;
                }
                if (entry.type === "dir" && !options.recursive) {
                    printLine(`rm: cannot remove '${name}': Is a directory`, "warning");
                    return;
                }
                virtualEntries.delete(name);
            });
        }

        async function copyEntry(source, destination) {
            const srcName = normalizeEntryName(source);
            if (!srcName) {
                printLine("cp: missing file operand", "warning");
                return;
            }
            const destName = normalizeEntryName(destination);
            if (!destName) {
                printLine(`cp: missing destination file operand after '${srcName}'`, "warning");
                return;
            }
            if (!isValidEntryName(srcName) || !isValidEntryName(destName)) {
                printLine("cp: invalid file name", "warning");
                return;
            }
            if (isSystemEntry(destName)) {
                printLine(`cp: cannot overwrite '${destName}': Permission denied`, "warning");
                return;
            }
            const sourceInfo = getEntryInfo(srcName);
            if (!sourceInfo) {
                printLine(`cp: cannot stat '${srcName}': No such file`, "warning");
                return;
            }
            if (sourceInfo.entry.type === "dir") {
                printLine(`cp: -r not specified; omitting directory '${srcName}'`, "warning");
                return;
            }
            const destInfo = getEntryInfo(destName);
            if (destInfo && destInfo.entry.type === "dir") {
                printLine(`cp: cannot overwrite directory '${destName}'`, "warning");
                return;
            }
            const result = await getFileContent(srcName);
            if (result.error) {
                printLine(`cp: cannot read '${srcName}'`, "warning");
                return;
            }
            const now = new Date();
            const existing = virtualEntries.get(destName);
            const createdAt = existing?.createdAt ?? now;
            virtualEntries.set(destName, {
                type: "file",
                content: result.content,
                createdAt,
                updatedAt: now
            });
        }

        function moveEntry(source, destination) {
            const srcName = normalizeEntryName(source);
            if (!srcName) {
                printLine("mv: missing file operand", "warning");
                return;
            }
            const destName = normalizeEntryName(destination);
            if (!destName) {
                printLine(`mv: missing destination file operand after '${srcName}'`, "warning");
                return;
            }
            if (!isValidEntryName(srcName) || !isValidEntryName(destName)) {
                printLine("mv: invalid file name", "warning");
                return;
            }
            if (isSystemEntry(srcName)) {
                printLine(`mv: cannot move '${srcName}': Permission denied`, "warning");
                return;
            }
            if (isSystemEntry(destName)) {
                printLine(`mv: cannot overwrite '${destName}': Permission denied`, "warning");
                return;
            }
            const sourceEntry = virtualEntries.get(srcName);
            if (!sourceEntry) {
                printLine(`mv: cannot stat '${srcName}': No such file`, "warning");
                return;
            }
            const destEntry = virtualEntries.get(destName);
            if (destEntry && destEntry.type === "dir") {
                printLine(`mv: cannot overwrite directory '${destName}'`, "warning");
                return;
            }
            virtualEntries.delete(srcName);
            virtualEntries.set(destName, { ...sourceEntry, updatedAt: new Date() });
        }

        function parseLineArgs(args, commandName) {
            let count = 10;
            let targetIndex = 0;
            if (args[0] === "-n") {
                count = Number.parseInt(args[1], 10);
                targetIndex = 2;
            } else if (args[0]?.startsWith("-n")) {
                count = Number.parseInt(args[0].slice(2), 10);
                targetIndex = 1;
            }
            const target = normalizeEntryName(args[targetIndex]);
            if (!target) {
                printLine(`${commandName}: missing file operand`, "warning");
                return null;
            }
            if (!Number.isFinite(count) || count <= 0) {
                printLine(`${commandName}: invalid number of lines`, "warning");
                return null;
            }
            return { count, target };
        }

        async function showLines(args, commandName, fromEnd = false) {
            const parsed = parseLineArgs(args, commandName);
            if (!parsed) {
                return;
            }
            const result = await getFileContent(parsed.target);
            if (result.error === "missing") {
                printLine(`${commandName}: ${parsed.target}: No such file`, "warning");
                return;
            }
            if (result.error === "isDir") {
                printLine(`${commandName}: ${parsed.target}: Is a directory`, "warning");
                return;
            }
            if (result.error) {
                printLine(`${commandName}: ${parsed.target}: Failed to read file`, "warning");
                return;
            }
            const lines = result.content.split(/\r?\n/);
            const selected = fromEnd ? lines.slice(-parsed.count) : lines.slice(0, parsed.count);
            printBlock(`<pre>${escapeHtml(selected.join("\n"))}</pre>`);
        }

        async function showHead(args) {
            await showLines(args, "head");
        }

        async function showTail(args) {
            await showLines(args, "tail", true);
        }

        async function runCommand(rawInput) {
            const input = rawInput.trim();
            if (!input) {
                return;
            }

            history.push(input);
            historyIndex = history.length;
            printLine(`<span class="prompt">katusa@humphreys:~$</span> ${escapeHtml(input)}`, "", true);

            const [command, ...args] = input.split(" ");
            const argString = args.join(" ");

            switch (command) {
                case "help":
                    printBlock(`<pre>${escapeHtml(commandHelp())}</pre>`);
                    break;
                case "about":
                    showAbout();
                    break;
                case "members":
                    showMembers();
                    break;
                case "shortcuts":
                    showShortcuts();
                    break;
                case "open": {
                    const target = findShortcut(argString);
                    if (!target) {
                        printLine("open: specify a valid shortcut name or index", "warning");
                        break;
                    }
                    window.open(target.url, "_blank", "noopener,noreferrer");
                    printLine(`launching: ${target.name}`, "muted");
                    break;
                }
                case "ets":
                    showEts();
                    break;
                case "date":
                    printLine(new Date().toString(), "muted");
                    break;
                case "uname":
                    showUname();
                    break;
                case "uptime":
                    showUptime();
                    break;
                case "hostname":
                    showHostname();
                    break;
                case "echo":
                    showEcho(argString);
                    break;
                case "id":
                    printLine("uid=1000(katusa) gid=1000(katusa) groups=1000(katusa)", "muted");
                    break;
                case "pwd":
                    printLine(homeDirectory, "muted");
                    break;
                case "whoami":
                    printLine("katusa", "muted");
                    break;
                case "ls":
                    showLs();
                    break;
                case "cat":
                    await showCat(args[0]);
                    break;
                case "head":
                    await showHead(args);
                    break;
                case "tail":
                    await showTail(args);
                    break;
                case "mkdir":
                    makeDirectories(args);
                    break;
                case "touch":
                    touchFiles(args);
                    break;
                case "cp":
                    await copyEntry(args[0], args[1]);
                    break;
                case "mv":
                    moveEntry(args[0], args[1]);
                    break;
                case "rm":
                    removeEntries(args);
                    break;
                case "history":
                    showHistory();
                    break;
                case "clear":
                    output.innerHTML = "";
                    break;
                default:
                    printLine(`command not found: ${command}`, "warning");
            }
        }

        function placeCaretAtEnd(element) {
            const selection = window.getSelection();
            const range = document.createRange();
            range.selectNodeContents(element);
            range.collapse(false);
            selection.removeAllRanges();
            selection.addRange(range);
        }

        function bootSequence() {
            const bootStart = performance.now();
            const bootLogs = [

            let totalDelay = 0;
            bootLogs.forEach((log) => {
                const jitter = 30 + Math.floor(Math.random() * 130);
                totalDelay += log.delay + jitter;
                setTimeout(() => {
                    let text = log.text;
                    if (/^\[\s*\d+\.\d+\]/.test(text)) {
                        const elapsed = (performance.now() - bootStart) / 1000;
                        const stamp = elapsed.toFixed(6).padStart(10, " ");
                        text = text.replace(/^\[\s*\d+\.\d+\]/, `[${stamp}]`);
                    }
                    printLine(text, "muted", text.includes("<span"));
                }, totalDelay);
            });

            setTimeout(() => {
                const promptLine = document.querySelector(".prompt-line");
                promptLine.style.display = "flex";
                commandInput.setAttribute("contenteditable", "true");
                commandInput.classList.remove("is-disabled");
                commandInput.focus();
                placeCaretAtEnd(commandInput);
                terminal.scrollTop = terminal.scrollHeight;
            }, totalDelay + 100);
        }

        commandInput.addEventListener("keydown", async (event) => {
            if (commandInput.getAttribute("contenteditable") !== "true") {
                return;
            }
            if (event.key === "Enter") {
                event.preventDefault();
                await runCommand(commandInput.textContent || "");
                commandInput.textContent = "";
                placeCaretAtEnd(commandInput);
            }

            if (event.key === "ArrowUp") {
                if (history.length === 0) {
                    return;
                }
                historyIndex = Math.max(0, historyIndex - 1);
                commandInput.textContent = history[historyIndex] || "";
                placeCaretAtEnd(commandInput);
                event.preventDefault();
            }

            if (event.key === "ArrowDown") {
                if (history.length === 0) {
                    return;
                }
                historyIndex = Math.min(history.length, historyIndex + 1);
                commandInput.textContent = history[historyIndex] || "";
                placeCaretAtEnd(commandInput);
                event.preventDefault();
            }
        });

        bootSequence();

        window.addEventListener("click", () => {
            if (commandInput.getAttribute("contenteditable") === "true") {
                commandInput.focus();
                placeCaretAtEnd(commandInput);
            }
        });
